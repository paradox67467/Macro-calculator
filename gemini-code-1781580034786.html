<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MacroSnap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0c0a09;
            --bg-surface: #1c1917;
            --bg-surface-elevated: #262220;
            --border-subtle: #2e2a28;
            --accent: #10b981;
            --accent-dim: rgba(16, 185, 129, 0.15);
            --text-primary: #f5f5f4;
            --text-secondary: #a8a29e;
            --text-muted: #78716c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* App Page Wrapper */
        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 24px 24px calc(24px + env(safe-area-inset-bottom)) 24px;
        }

        .active {
            display: flex;
        }

        /* --- DASHBOARD VIEW --- */
        .header-section {
            width: 100%;
            margin-top: 12px;
            margin-bottom: 24px;
        }

        .header-section h2 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .header-section p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 2px;
        }

        /* Progress Card Components */
        .summary-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 28px;
        }

        .calorie-tracker {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .metric-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .metric-value-large {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-top: 6px;
        }

        .metric-value-large span {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0;
        }

        .macro-progress-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .macro-progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .macro-info-label {
            width: 65px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .progress-track {
            flex-grow: 1;
            height: 6px;
            background: var(--bg-base);
            border-radius: 3px;
            margin: 0 16px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .macro-data-numbers {
            font-size: 0.875rem;
            font-weight: 600;
            text-align: right;
            width: 55px;
        }

        /* History Activity Feed */
        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 14px;
            width: 100%;
        }

        .history-feed {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 24px;
        }

        .history-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-details h4 {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .item-details p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .item-calories {
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
        }

        /* Global Interactive Buttons */
        button {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        button.primary-btn {
            background: var(--text-primary);
            color: var(--bg-base);
        }

        button.action-btn {
            background: var(--accent);
            color: #ffffff;
        }

        button.outline-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* --- SCANNER VIEW --- */
        .navigation-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-nav-trigger {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .camera-module-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            margin-bottom: 24px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        /* Reticle scanning viewfinder graphic Overlay */
        .scanner-reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65%;
            height: 65%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            pointer-events: none;
        }

        .scanner-reticle::before, .scanner-reticle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--accent);
            border-style: solid;
            pointer-events: none;
        }

        .scanner-reticle::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-top-left-radius: 8px; }
        .scanner-reticle::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-bottom-right-radius: 8px; }

        /* Dynamic Status Loading & Analytical Output Containers */
        .response-container {
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        #scanning-state-indicator {
            display: none;
            color: var(--accent);
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            animation: pulseFade 1.6s infinite ease-in-out;
        }

        @keyframes pulseFade {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #analytics-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            display: none;
        }

        .result-meta-title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            text-transform: capitalize;
        }

        .grid-matrix-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .matrix-cell {
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            padding: 14px;
            border-radius: 14px;
        }

        .cell-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        .cell-data {
            font-size: 1.15rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- SECTION 1: SYSTEM DASHBOARD HOME -->
    <div id="dashboard-page" class="page active">
        <div class="header-section">
            <h2>Analytics</h2>
            <p id="current-date-string">Daily Overview</p>
        </div>

        <div class="summary-card">
            <div class="calorie-tracker">
                <div>
                    <div class="metric-title">Energy Consumed</div>
                    <div class="metric-value-large" id="total-kcal-display">0 <span>/ 2400 kcal</span></div>
                </div>
            </div>

            <div class="macro-progress-container">
                <div class="macro-progress-row">
                    <div class="macro-info-label">Protein</div>
                    <div class="progress-track"><div id="bar-protein" class="progress-bar"></div></div>
                    <div class="macro-data-numbers" id="val-protein">0g</div>
                </div>
                <div class="macro-progress-row">
                    <div class="macro-info-label">Carbs</div>
                    <div class="progress-track"><div id="bar-carbs" class="progress-bar"></div></div>
                    <div class="macro-data-numbers" id="val-carbs">0g</div>
                </div>
                <div class="macro-progress-row">
                    <div class="macro-info-label">Fats</div>
                    <div class="progress-track"><div id="bar-fats" class="progress-bar"></div></div>
                    <div class="macro-data-numbers" id="val-fats">0g</div>
                </div>
            </div>
        </div>

        <div class="section-title">Recent Records</div>
        <div class="history-feed" id="history-feed-target">
            <!-- Dynamic Injection Area -->
        </div>

        <button class="primary-btn" onclick="navigateToScanner()">Launch Scanner</button>
    </div>

    <!-- SECTION 2: INTELLIGENT REALTIME SCANNER MODAL OVERLAY -->
    <div id="scanner-page" class="page">
        <div class="navigation-top">
            <div class="back-nav-trigger" onclick="navigateToDashboard()">Cancel</div>
            <div style="font-weight: 600; font-size: 0.95rem;">Computer Vision</div>
            <div style="width: 45px;"></div> 
        </div>

        <div class="camera-module-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="scanner-reticle"></div>
        </div>

        <div class="response-container">
            <div id="scanning-state-indicator">Analyzing core nutritional structure...</div>

            <div id="analytics-card">
                <div id="food-title-output" class="result-meta-title">Item Analysis</div>
                <div class="grid-matrix-metrics">
                    <div class="matrix-cell"><div class="cell-tag">Calories</div><div class="cell-data" id="out-kcal">0 kcal</div></div>
                    <div class="matrix-cell"><div class="cell-tag">Protein</div><div class="cell-data" id="out-protein">0g</div></div>
                    <div class="matrix-cell"><div class="cell-tag">Carbohydrates</div><div class="cell-data" id="out-carbs">0g</div></div>
                    <div class="matrix-cell"><div class="cell-tag">Lipids / Fats</div><div class="cell-data" id="out-fats">0g</div></div>
                </div>
            </div>
        </div>

        <div id="scanner-controls-cluster">
            <button id="capture-execution-trigger" class="action-btn" onclick="executeImageAnalysis()">Capture Image</button>
            <button id="commit-data-trigger" class="primary-btn" style="display: none;" onclick="commitAnalysisToMemory()">Log to Dashboard</button>
            <button id="re-verify-trigger" class="outline-btn" style="display: none; margin-top: 12px;" onclick="resetScannerInterface()">Re-scan Item</button>
        </div>
    </div>

    <script>
        // System Configured Keys & Hardware References
        const ORCHESTRATION_KEY = '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';
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scanningIndicator = document.getElementById('scanning-state-indicator');
        const analyticsCard = document.getElementById('analytics-card');
        const captureBtn = document.getElementById('capture-execution-trigger');
        const commitBtn = document.getElementById('commit-data-trigger');
        const reverifyBtn = document.getElementById('re-verify-trigger');

        // Dynamic Runtime Cache Memory Data Stores
        let activeMacroSessionLog = null;
        const memoryRepository = [];

        // App Targets Profiles
        const nutritionalTargets = { kcal: 2400, protein: 160, carbs: 280, fat: 70 };

        // Initialization Routine
        window.addEventListener('DOMContentLoaded', () => {
            const dateOptions = { weekday: 'long', month: 'short', day: 'numeric' };
            document.getElementById('current-date-string').innerText = new Date().toLocaleDateString('en-US', dateOptions);
            updateDashboardMetricsView();
        });

        // App View Navigation Engines
        function navigateToScanner() {
            document.getElementById('dashboard-page').classList.remove('active');
            document.getElementById('scanner-page').classList.add('active');
            initializeCameraPeripheral();
        }

        function navigateToDashboard() {
            stopCameraHardwarePeripheral();
            document.getElementById('scanner-page').classList.remove('active');
            document.getElementById('dashboard-page').classList.add('active');
            resetScannerInterface();
        }

        // Camera Initialization Pipeline Routines
        async function initializeCameraPeripheral() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1080 }, height: { ideal: 1080 } }
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Hardware Video Input Allocation Failure:", err);
            }
        }

        function stopCameraHardwarePeripheral() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        // Computer Vision Engine Core Execution Block
        async function executeImageAnalysis() {
            if (!video.videoWidth) return;

            // Frame capture pipeline conversion sequence
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64PayloadPayloadData = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

            // Toggle dynamic analytical state views
            captureBtn.style.display = 'none';
            scanningIndicator.style.display = 'block';
            analyticsCard.style.display = 'none';

            try {
                const structuralAPIResponse = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ORCHESTRATION_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "Identify the object. If it is edible, evaluate the exact nutritional macro properties for an average serving sizing setup. Return strictly a single raw formatted JSON object array with no markdown enclosure code wrappers or introductory text lines. Structural target matching layout schema: {\"food\": \"string_name\", \"calories\": number, \"protein\": number, \"carbs\": number, \"fat\": number}" },
                                { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64PayloadPayloadData}` } }
                            ]
                        }],
                        temperature: 0.1
                    })
                });

                const structuralPayloadJSON = await structuralAPIResponse.json();
                let sanitationString = structuralPayloadJSON.choices[0].message.content.trim();
                
                // Remove syntax anomalies if present
                sanitationString = sanitationString.replace(/```json/g, '').replace(/
```/g, '').trim();
                
                activeMacroSessionLog = JSON.parse(sanitationString);
                renderExtractedMetrics(activeMacroSessionLog);

            } catch (runtimeException) {
                console.error("AI Model Decryption Pipeline Interrupted:", runtimeException);
                alert("Failed to analyze image content structure.");
                resetScannerInterface();
            }
        }

        function renderExtractedMetrics(parsedData) {
            scanningIndicator.style.display = 'none';
            
            document.getElementById('food-title-output').innerText = parsedData.food || "Unknown Item";
            document.getElementById('out-kcal').innerText = `${parsedData.calories || 0} kcal`;
            document.getElementById('out-protein').innerText = `${parsedData.protein || 0}g`;
            document.getElementById('out-carbs').innerText = `${parsedData.carbs || 0}g`;
            document.getElementById('out-fats').innerText = `${parsedData.fat || 0}g`;

            analyticsCard.style.display = 'block';
            commitBtn.style.display = 'block';
            reverifyBtn.style.display = 'block';
        }

        function resetScannerInterface() {
            activeMacroSessionLog = null;
            analyticsCard.style.display = 'none';
            commitBtn.style.display = 'none';
            reverifyBtn.style.display = 'none';
            scanningIndicator.style.display = 'none';
            captureBtn.style.display = 'block';
        }

        // State Machine Cache Storage Interactivity Methods
        function commitAnalysisToMemory() {
            if (!activeMacroSessionLog) return;
            
            memoryRepository.unshift({
                id: Date.now(),
                timestamp: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                ...activeMacroSessionLog
            });

            updateDashboardMetricsView();
            navigateToDashboard();
        }

        function updateDashboardMetricsView() {
            let runningKcal = 0, runningProtein = 0, runningCarbs = 0, runningFat = 0;

            const feedContainer = document.getElementById('history-feed-target');
            feedContainer.innerHTML = '';

            if (memoryRepository.length === 0) {
                feedContainer.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 32px 16px; font-size: 0.875rem;">No logs recorded today.</div>`;
            } else {
                memoryRepository.forEach(record => {
                    runningKcal += (record.calories || 0);
                    runningProtein += (record.protein || 0);
                    runningCarbs += (record.carbs || 0);
                    runningFat += (record.fat || 0);

                    const historyCardRowNode = document.createElement('div');
                    historyCardRowNode.className = 'history-item';
                    historyCardRowNode.innerHTML = `
                        <div class="item-details">
                            <h4>${record.food}</h4>
                            <p>${record.timestamp} · P: ${record.protein}g · C: ${record.carbs}g · F: ${record.fat}g</p>
                        </div>
                        <div class="item-calories">${record.calories} kcal</div>
                    `;
                    feedContainer.appendChild(historyCardRowNode);
                });
            }

            // Calculations conversion display operations
            document.getElementById('total-kcal-display').innerHTML = `${runningKcal} <span>/ ${nutritionalTargets.kcal} kcal</span>`;
            document.getElementById('val-protein').innerText = `${runningProtein}g`;
            document.getElementById('val-carbs').innerText = `${runningCarbs}g`;
            document.getElementById('val-fats').innerText = `${runningFat}g`;

            // Percentage engine calculations bounding animations adjustments
            document.getElementById('bar-protein').style.width = `${Math.min((runningProtein / nutritionalTargets.protein) * 100, 100)}%`;
            document.getElementById('bar-carbs').style.width = `${Math.min((runningCarbs / nutritionalTargets.carbs) * 100, 100)}%`;
            document.getElementById('bar-fats').style.width = `${Math.min((runningFat / nutritionalTargets.fat) * 100, 100)}%`;
        }
    </script>
</body>
</html>
